<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Library Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">📚 Staff Dashboard</div>
        <div class="nav-info">
            <span id="userName"></span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="sidebar">
            <button class="sidebar-btn active" onclick="showSection('books')">📖 Manage Books</button>
            <button class="sidebar-btn" onclick="showSection('issue')">📕 Issue Book</button>
            <button class="sidebar-btn" onclick="showSection('return')">📘 Return Book</button>
            <button class="sidebar-btn" onclick="showSection('issued')">📋 Issued Books</button>
        </div>

        <div class="main-content">
            <!-- Books Management -->
            <div id="booksSection" class="section active">
                <h2>Book Catalog</h2>
                <div class="card">
                    <h3>Add New Book</h3>
                    <form id="addBookForm">
                        <input type="text" id="bookTitle" placeholder="Book Title" required>
                        <input type="text" id="bookAuthor" placeholder="Author" required>
                        <input type="text" id="bookISBN" placeholder="ISBN" required>
                        <input type="text" id="bookCategory" placeholder="Category">
                        <input type="number" id="bookQuantity" placeholder="Quantity" required>
                        <input type="text" id="bookLocation" placeholder="Location">
                        <button type="submit" class="btn-primary">Add Book</button>
                    </form>
                </div>
                <div class="card">
                    <input type="text" id="searchBooks" placeholder="Search books..." onkeyup="searchBooks()">
                    <div id="booksList"></div>
                </div>
            </div>

            <!-- Issue Book -->
            <div id="issueSection" class="section">
                <h2>Issue Book to Student</h2>
                <div class="card">
                    <form id="issueForm">
                        <label>Select Book:</label>
                        <select id="issueBookId" required></select>
                        <label>Student Email:</label>
                        <input type="email" id="studentEmail" placeholder="student@example.com" required>
                        <button type="submit" class="btn-primary">Issue Book</button>
                    </form>
                </div>
            </div>

            <!-- Return Book - FIXED VERSION -->
            <div id="returnSection" class="section">
                <h2>Return Book</h2>
                <div class="card">
                    <label>Select Issued Book:</label>
                    <select id="returnTransactionId" required></select>
                    <button onclick="returnBookStaff()" class="btn-primary" style="margin-top: 10px;">Return Book</button>
                </div>
                <div id="returnMessage" style="margin-top: 10px;"></div>
            </div>

            <!-- Issued Books -->
            <div id="issuedSection" class="section">
                <h2>All Issued Books</h2>
                <div id="issuedBooksList"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
