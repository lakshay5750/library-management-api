<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>📚 Library Management System</h1>
                <p>Login to access your dashboard</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <div class="demo-credentials">
                <h3>Demo Credentials</h3>
                <div class="cred-row"><strong>Admin:</strong> admin@library.com / admin123</div>
                <div class="cred-row"><strong>Staff:</strong> staff@library.com / staff123</div>
                <div class="cred-row"><strong>Student:</strong> student@library.com / student123</div>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
