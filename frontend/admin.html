<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Library Management</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">📚 Admin Dashboard</div>
        <div class="nav-info">
            <span id="userName"></span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="sidebar">
            <button class="sidebar-btn active" onclick="showSection('students')">👨‍🎓 Manage Students</button>
            <button class="sidebar-btn" onclick="showSection('staff')">👥 Manage Staff</button>
            <button class="sidebar-btn" onclick="showSection('books')">📖 Manage Books</button>
            <button class="sidebar-btn" onclick="showSection('settings')">⚙️ System Settings</button>
            <button class="sidebar-btn" onclick="showSection('issued')">📋 Issued Books</button>
        </div>

        <div class="main-content">
            <!-- Student Management -->
            <div id="studentsSection" class="section active">
                <h2>Manage Student Accounts</h2>
                <div class="card">
                    <h3>Add New Student</h3>
                    <form id="addStudentForm">
                        <input type="text" id="studentName" placeholder="Full Name" required>
                        <input type="email" id="studentEmail" placeholder="Email Address" required>
                        <input type="password" id="studentPassword" placeholder="Password" required>
                        <button type="submit" class="btn-primary">Add Student</button>
                    </form>
                </div>
                <div class="card">
                    <h3>Student List</h3>
                    <div id="studentsList"></div>
                </div>
            </div>

            <!-- Staff Management -->
            <div id="staffSection" class="section">
                <h2>Manage Staff Accounts</h2>
                <div class="card">
                    <h3>Add New Staff</h3>
                    <form id="addStaffForm">
                        <input type="text" id="staffName" placeholder="Full Name" required>
                        <input type="email" id="staffEmail" placeholder="Email" required>
                        <input type="password" id="staffPassword" placeholder="Password" required>
                        <button type="submit" class="btn-primary">Add Staff</button>
                    </form>
                </div>
                <div class="card">
                    <h3>Staff List</h3>
                    <div id="staffList"></div>
                </div>
            </div>

            <!-- Books Management -->
            <div id="booksSection" class="section">
                <h2>Manage Books</h2>
                <div class="card">
                    <h3>Add New Book</h3>
                    <form id="addBookForm">
                        <input type="text" id="bookTitle" placeholder="Book Title" required>
                        <input type="text" id="bookAuthor" placeholder="Author" required>
                        <input type="text" id="bookISBN" placeholder="ISBN" required>
                        <input type="text" id="bookCategory" placeholder="Category">
                        <input type="number" id="bookQuantity" placeholder="Quantity" required>
                        <input type="text" id="bookLocation" placeholder="Location">
                        <button type="submit" class="btn-primary">Add Book</button>
                    </form>
                </div>
                <div class="card">
                    <input type="text" id="searchBooks" placeholder="Search books..." onkeyup="searchBooks()">
                    <div id="booksList"></div>
                </div>
            </div>

            <!-- System Settings -->
            <div id="settingsSection" class="section">
                <h2>System Configuration</h2>
                <div class="card">
                    <h3>Fine & Return Settings</h3>
                    <form id="settingsForm">
                        <label>Fine per day (₹):</label>
                        <input type="number" id="finePerDay" required>
                        <label>Default return days:</label>
                        <input type="number" id="returnDays" required>
                        <button type="submit" class="btn-primary">Update Settings</button>
                    </form>
                </div>
            </div>

            <!-- Issued Books -->
            <div id="issuedSection" class="section">
                <h2>Currently Issued Books</h2>
                <div id="issuedBooksList"></div>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
